name: Publish daily PS jailbreak digest

on:
  schedule:
    # Staggered attempts avoid GitHub's top-of-hour congestion and cover dropped runs.
    - cron: "17 13 * * *"
    - cron: "47 16 * * *"
    - cron: "27 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: daily-ps-jailbreak-digest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate digest
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          EXCLUDED_POST_TEXT: ${{ secrets.EXCLUDED_POST_TEXT }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_ENGLISH_TRANSLATION: "true"
          BLUESKY_HANDLE: ${{ vars.BLUESKY_HANDLE || 'crump-youtube.bsky.social' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TELEGRAM: ${{ github.event_name == 'schedule' && github.event.schedule == '27 20 * * *' }}
        run: node reddit_telegram_summary.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Keep daily archive in Git
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if ! git diff --cached --quiet; then
            git commit -m "Publish digest $(date -u +%F)"
            git pull --rebase
            git push
          fi
